<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Controle de Almoxarifado</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-body-tertiary">

  <div class="container">

    <main>

      <div class="py-5 text-center">
        <h1 class="h2">Controle de Almoxarifado</h1>
        <p class="lead">
          Cadastro e controle de materiais
        </p>
      </div>

      <div class="row g-5">

        <!-- TABELA -->
        <div class="col-md-5 col-lg-4 order-md-last">

          <h4 class="mb-3">
            Materiais Cadastrados
          </h4>

          <table class="table table-striped table-bordered">

            <thead class="table-success">
              <tr>
                <th>Material</th>
                <th>Quantidade</th>
              </tr>
            </thead>

            <tbody id="lista-materiais">
              <!-- Dados carregados pela API -->
            </tbody>

          </table>

        </div>

        <!-- FORMULÁRIO -->
        <div class="col-md-7 col-lg-8">

          <h4 class="mb-3">
            Cadastro de Material
          </h4>

          <form>

            <div class="row g-3">

              <div class="col-12">
                <label for="input-nome" class="form-label">
                  Nome do Material
                </label>

                <input
                  type="text"
                  class="form-control"
                  id="input-nome"
                  placeholder="Digite o nome do material"
                  required>
              </div>

              <div class="col-12">
                <label for="input-quantidade" class="form-label">
                  Quantidade
                </label>

                <input
                  type="number"
                  class="form-control"
                  id="input-quantidade"
                  placeholder="Digite a quantidade"
                  required>
              </div>

            </div>

            <hr class="my-4">

            <button
              id="btn-cadastrar"
              class="w-100 btn btn-success btn-lg"
              type="button">

              Cadastrar Material

            </button>

          </form>

        </div>

      </div>

    </main>

    <footer class="my-5 pt-5 text-body-secondary text-center text-small">
      <p class="mb-1">
        Sistema de Controle de Almoxarifado
      </p>
    </footer>

  </div>

  <!-- JS no final do body -->
  <script src="main.js"></script>

</body>
</html>
